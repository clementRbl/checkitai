# Configuration Airflow locale pour le projet CheckItAI (etape 4).
#
# Version allegee du docker-compose officiel : on utilise LocalExecutor au lieu de
# CeleryExecutor pour limiter le nombre de conteneurs (pas de Redis, worker, triggerer).
# Cette configuration est destinee a un usage LOCAL uniquement, pas a la production.
#
# Services :
#   - postgres          : base interne d'Airflow (metadonnees)
#   - checkit-postgres  : notre base de donnees metier (chargement des publications)
#   - airflow-webserver : interface web (http://localhost:8080)
#   - airflow-scheduler : ordonnanceur qui execute les DAG
#   - airflow-init      : initialisation (migration DB + creation de l'utilisateur admin)
---
x-airflow-common:
  &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:2.10.4}
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    # Cle Fernet : chiffre les connexions et variables sensibles stockees par Airflow.
    # Fournie via .env (generee une fois) plutot que laissee vide.
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    # On masque les DAG d'exemple pour garder l'UI focalisee sur notre pipeline.
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # Dependances installees au demarrage (usage local : suffisant pour la demo).
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-requests python-dotenv psycopg2-binary}
    # Variables metier transmises au DAG (lues depuis le fichier .env).
    NEWS_DATA_API_KEY: ${NEWS_DATA_API_KEY:-}
    CHECKIT_DB_HOST: checkit-postgres
    CHECKIT_DB_NAME: checkit
    CHECKIT_DB_USER: checkit
    CHECKIT_DB_PASSWORD: ${CHECKIT_DB_PASSWORD:-checkit}
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
    - ${AIRFLOW_PROJ_DIR:-.}/data:/opt/airflow/data
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      # Expose sur 5434 cote hote : permet au tableau de bord KPI (etape 5) de lire
      # les durees d'execution des taches dans les metadonnees d'Airflow.
      - "5434:5432"
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # Base de donnees metier : stockage des publications chargees (le "L" de l'ETL).
  # Utilisateur et base dedies, distincts de l'admin Airflow (bonne pratique de securite).
  checkit-postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: checkit
      POSTGRES_PASSWORD: ${CHECKIT_DB_PASSWORD:-checkit}
      POSTGRES_DB: checkit
    ports:
      # Expose sur 5433 cote hote pour pouvoir verifier les donnees chargees.
      - "5433:5432"
    volumes:
      - checkit-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "checkit"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /sources/logs /sources/dags /sources/plugins /sources/data
        chown -R "${AIRFLOW_UID:-50000}:0" /sources/{logs,dags,plugins,data}
        exec /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}:/sources

volumes:
  postgres-db-volume:
  checkit-db-volume:
